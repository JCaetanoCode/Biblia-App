<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Bíblia Sagrada com versões ACF, AA e NVI.">
<meta name="theme-color" content="#0F0D0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bíblia">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Bíblia Sagrada</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#C9A84C;--gold-light:#F0D898;--gold-dark:#7A5E1E;
    --bg:#0F0D0A;--bg2:#181410;--bg3:#231F18;--bg4:#2E2820;--surface:#1E1A14;
    --border:rgba(201,168,76,0.18);--border2:rgba(201,168,76,0.35);
    --text:#EDE8DC;--text2:#B5A989;--text3:#7A6F56;
    --highlight:rgba(201,168,76,0.22);--highlight-border:rgba(201,168,76,0.7);
    --verse-num:#C9A84C;--radius:12px;--radius-sm:8px;
    --search-hl:rgba(255,200,50,0.35);--fav:#E05C7A;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #080604;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
  }
  #app {
    display: flex;
    flex-direction: column;
    /* position:fixed + inset:0 = ancora à viewport real em TODOS os browsers */
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    bottom: 0;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,.8);
  }

  /* HEADER */
  #header{background:var(--bg2);border-bottom:.5px solid var(--border);padding:max(12px,env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:20}
  #hlogo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  #hcenter{flex:1;min-width:0}
  #htitle{font-family:'Crimson Pro',serif;font-size:18px;font-weight:600;color:var(--gold-light);letter-spacing:.3px;line-height:1.2}
  #hsub{font-size:11px;color:var(--text3);margin-top:1px}
  #hactions{display:flex;gap:6px}
  .ibtn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--bg3);border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:background .15s,border-color .15s;flex-shrink:0;position:relative}
  .ibtn:active,.ibtn.act{background:var(--bg4);border-color:var(--border2);color:var(--gold)}
  .ibtn.fav-act{color:var(--fav)!important;border-color:rgba(224,92,122,.4)!important}
  .badge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;border-radius:8px;background:var(--fav);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:1.5px solid var(--bg2)}
  .badge.h{display:none}

  /* VER BAR */
  #vbar{background:var(--bg2);border-bottom:.5px solid var(--border);padding:8px 16px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;z-index:10}
  #vbar::-webkit-scrollbar{display:none}
  .vbtn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;letter-spacing:.5px;border:.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .vbtn.on{background:var(--gold);border-color:var(--gold);color:var(--bg)}

  /* NAV TABS */
  #ntabs{background:var(--bg2);border-bottom:.5px solid var(--border);display:flex;flex-shrink:0;z-index:10}
  .ntab{flex:1;padding:10px 8px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.3px}
  .ntab.on{color:var(--gold);border-bottom-color:var(--gold)}

  /* MAIN */
  #main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
  #main::-webkit-scrollbar{width:4px}
  #main::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
  .panel{display:none}.panel.on{display:block}

  /* BOOK GRID */
  #bklist{padding:12px 16px 24px}
  .tlabel{font-size:10px;letter-spacing:1.5px;font-weight:600;color:var(--gold);text-transform:uppercase;padding:16px 0 8px;display:flex;align-items:center;gap:8px}
  .tlabel::after{content:'';flex:1;height:.5px;background:var(--border)}
  .bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .bbtn{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;line-height:1.3;transition:all .15s}
  .bbtn:active{background:var(--bg4);border-color:var(--border2);color:var(--gold-light)}

  /* CHAPTER GRID */
  #cpanel{padding:16px}
  .bk{display:flex;align-items:center;gap:8px;color:var(--gold);font-size:13px;cursor:pointer;margin-bottom:16px;font-weight:500}
  #ctitle{font-family:'Crimson Pro',serif;font-size:22px;color:var(--gold-light);margin-bottom:16px;font-weight:600}
  #cgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .cbtn{aspect-ratio:1;border-radius:var(--radius-sm);background:var(--surface);border:.5px solid var(--border);font-size:13px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
  .cbtn:active{background:var(--gold);border-color:var(--gold);color:var(--bg)}

  /* READING */
  #rpanel{padding:0 0 80px}
  #rheader{padding:12px 16px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
  #rbk{display:flex;align-items:center;gap:6px;color:var(--gold);font-size:13px;cursor:pointer;font-weight:500;flex-shrink:0}
  #rloc{font-family:'Crimson Pro',serif;font-size:17px;color:var(--gold-light);font-weight:600;flex:1;text-align:center}
  #rnav{display:flex;gap:6px;flex-shrink:0}
  .narr{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--bg3);border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:14px;transition:all .15s}
  .narr:active{background:var(--bg4);color:var(--gold)}
  #ccontent{padding:20px 16px 16px}

  /* VERSE ROWS */
  .vrow{display:flex;gap:10px;margin-bottom:12px;padding:8px 10px;border-radius:var(--radius-sm);transition:background .12s;border:1px solid transparent;align-items:flex-start}
  .vrow.hl{background:var(--highlight)!important;border-color:var(--highlight-border)!important}
  .vrow.faved{border-left:2.5px solid var(--fav)!important}
  .vn{font-size:11px;font-weight:600;color:var(--verse-num);min-width:22px;padding-top:4px;flex-shrink:0}
  .vt{font-family:'Crimson Pro',serif;font-size:var(--vs,17px);line-height:1.7;color:var(--text);font-weight:300;flex:1}
  .vstar{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:17px;transition:color .15s,transform .15s;border-radius:6px;margin-top:1px;user-select:none}
  .vstar:active{transform:scale(1.35)}
  .vstar.on{color:var(--fav)}

  /* VERSE JUMP */
  #vjump{background:var(--bg2);border-top:.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:10}
  #vjump label{font-size:12px;color:var(--text3);white-space:nowrap}
  #vinput{flex:1;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;outline:none;min-width:0}
  #vinput:focus{border-color:var(--border2)}
  #vgo{padding:7px 14px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:'Outfit',sans-serif}

  /* SEARCH */
  #spanel{padding:16px 16px 80px}
  #sbar{display:flex;gap:8px;align-items:center;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--radius);padding:10px 14px}
  #sbar svg{flex-shrink:0;color:var(--text3)}
  #sinput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;font-family:'Outfit',sans-serif}
  #sinput::placeholder{color:var(--text3)}
  #sclear{cursor:pointer;color:var(--text3);font-size:18px;padding:2px}
  #sopts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .sopt{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.3px;border:.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
  .sopt.on{background:rgba(201,168,76,.15);border-color:var(--border2);color:var(--gold)}
  #sres{margin-top:12px}
  #scnt{font-size:12px;color:var(--text3);margin-bottom:12px}
  .rcard{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .rcard:active{border-color:var(--border2)}
  .rref{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:6px;letter-spacing:.3px}
  .rtxt{font-family:'Crimson Pro',serif;font-size:15px;line-height:1.6;color:var(--text2)}
  .rtxt mark{background:var(--search-hl);color:var(--gold-light);border-radius:3px;padding:0 2px}
  .empty{text-align:center;padding:48px 24px;color:var(--text3)}
  .empty .ei{font-size:40px;margin-bottom:12px}
  .empty p{font-size:14px;line-height:1.6}

  /* ===== FAVORITES PANEL ===== */
  #fpanel{padding:0 0 80px}
  #fhdr{padding:14px 16px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  #ftitle{font-family:'Crimson Pro',serif;font-size:21px;color:var(--gold-light);font-weight:600;display:flex;align-items:center;gap:8px}
  #ftitle .fcnt{font-size:12px;background:rgba(224,92,122,.15);color:var(--fav);padding:2px 9px;border-radius:20px;font-family:'Outfit',sans-serif;font-weight:600}
  #fsort{display:flex;gap:6px}
  .sortbtn{padding:5px 10px;border-radius:20px;font-size:11px;border:.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
  .sortbtn.on{border-color:var(--border2);color:var(--text2)}
  #ffilter{padding:8px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:.5px solid var(--border);flex-shrink:0}
  #ffilter::-webkit-scrollbar{display:none}
  .ffbtn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .ffbtn.on{background:rgba(224,92,122,.1);border-color:rgba(224,92,122,.35);color:var(--fav)}
  #flist{padding:12px 16px}
  .fglabel{font-size:10px;letter-spacing:1.5px;font-weight:600;color:var(--text3);text-transform:uppercase;padding:12px 0 8px;display:flex;align-items:center;gap:8px}
  .fglabel::after{content:'';flex:1;height:.5px;background:var(--border)}
  .fcard{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;border-left:2.5px solid var(--fav);overflow:hidden;animation:fdin .25s ease}
  @keyframes fdin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fcbody{padding:12px 14px;cursor:pointer}
  .fcbody:active{background:rgba(255,255,255,.02)}
  .fref{font-size:12px;font-weight:600;color:var(--fav);margin-bottom:6px;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
  .fvtag{font-size:10px;background:rgba(224,92,122,.12);padding:1px 6px;border-radius:10px;font-weight:500}
  .fvtxt{font-family:'Crimson Pro',serif;font-size:15px;line-height:1.6;color:var(--text2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .fnote{display:flex;align-items:flex-start;gap:6px;margin-top:8px;padding:7px 10px;background:rgba(201,168,76,.06);border-radius:6px;border-left:2px solid rgba(201,168,76,.3)}
  .fnicon{font-size:12px;flex-shrink:0;margin-top:1px;color:var(--gold)}
  .fntxt{font-size:13px;color:var(--text2);font-style:italic;line-height:1.5}
  .fdate{font-size:10px;color:var(--text3);margin-top:6px}
  .fcfoot{display:flex;border-top:.5px solid var(--border)}
  .fact{flex:1;padding:9px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:var(--text3);cursor:pointer;transition:background .12s}
  .fact:active{background:rgba(255,255,255,.03)}
  .fact+.fact{border-left:.5px solid var(--border)}
  .fact.del{color:rgba(224,92,122,.7)}
  .fact.del:active{color:var(--fav)}

  /* NOTE MODAL */
  #nover{position:absolute;inset:0;background:rgba(0,0,0,.8);z-index:60;display:none;align-items:flex-end}
  #nover.on{display:flex}
  #nmodal{background:var(--bg2);border-top:.5px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%}
  #nref{font-size:13px;color:var(--fav);font-weight:600;margin-bottom:5px;letter-spacing:.3px}
  #nprev{font-family:'Crimson Pro',serif;font-size:15px;color:var(--text3);margin-bottom:14px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  #nlabel{font-size:11px;color:var(--text3);margin-bottom:8px;letter-spacing:.5px}
  #ntarea{width:100%;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;font-family:'Outfit',sans-serif;resize:none;outline:none;line-height:1.6;height:90px}
  #ntarea:focus{border-color:var(--border2)}
  #nacts{display:flex;gap:10px;margin-top:14px}
  #ncancel{flex:1;padding:11px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:14px;cursor:pointer;font-family:'Outfit',sans-serif}
  #nsave{flex:2;padding:11px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:var(--bg);font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}

  /* VERSE ACTION SHEET */
  #vaover{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:55;display:none;align-items:flex-end}
  #vaover.on{display:flex}
  #vasheet{background:var(--bg2);border-top:.5px solid var(--border);border-radius:20px 20px 0 0;padding:16px 16px 28px;width:100%}
  #varef{font-size:13px;font-weight:600;color:var(--gold);margin-bottom:4px}
  #vatxt{font-family:'Crimson Pro',serif;font-size:15px;color:var(--text3);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  #vadiv{height:.5px;background:var(--border);margin-bottom:8px}
  .vabtn{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:.5px solid var(--border);cursor:pointer}
  .vabtn:last-child{border-bottom:none}
  .vabtn:active{opacity:.7}
  .vaico{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .valbl{font-size:15px;font-weight:500}
  .vadesc{font-size:12px;color:var(--text3);margin-top:1px}

  /* VERSION MODAL */
  #vmodalover{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none;align-items:flex-end}
  #vmodalover.on{display:flex}
  #vmodal{background:var(--bg2);border-top:.5px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%}
  #vmodal h3{font-family:'Crimson Pro',serif;font-size:20px;color:var(--gold-light);margin-bottom:16px;font-weight:600}
  .vopt{padding:14px 16px;border-radius:var(--radius);background:var(--bg3);border:.5px solid var(--border);margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s}
  .vopt.on{border-color:var(--gold)}
  .vbadge{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--gold);flex-shrink:0}
  .vinfo strong{display:block;font-size:14px;font-weight:600;color:var(--text)}
  .vinfo span{font-size:12px;color:var(--text3)}
  .vchk{margin-left:auto;color:var(--gold);font-size:18px;opacity:0}
  .vopt.on .vchk{opacity:1}

  /* LOADING */
  #loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px}
  #loading.h{display:none}
  .lcross{width:48px;height:48px;position:relative}
  .lcross::before,.lcross::after{content:'';position:absolute;background:var(--gold);border-radius:3px;animation:pp 1.4s ease-in-out infinite}
  .lcross::before{width:10px;height:48px;left:50%;transform:translateX(-50%)}
  .lcross::after{width:48px;height:10px;top:50%;transform:translateY(-50%);animation-delay:.2s}
  @keyframes pp{0%,100%{opacity:.3}50%{opacity:1}}
  #loading p{font-size:13px;color:var(--text3);letter-spacing:1px}

  /* TOAST */
  #toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);border:.5px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:24px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* FONT BTNS */
  .fbtn{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:.5px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
  .fbtn:active{background:var(--bg4);color:var(--gold)}

  /* ===== PWA INSTALL BANNER ===== */
  #install-banner {
    background: var(--bg2);
    border-top: .5px solid var(--border);
    padding: 14px 16px;
    display: none; align-items: center; gap: 12px;
    flex-shrink: 0;
    z-index: 300;
    animation: slideUp .4s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #install-banner.show { display: flex; }
  #install-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  #install-text { flex: 1; min-width: 0; }
  #install-text strong { display: block; font-size: 13px; font-weight: 600; color: var(--text); }
  #install-text span { font-size: 11px; color: var(--text3); }
  #install-btn {
    padding: 8px 16px; background: var(--gold); color: var(--bg);
    border: none; border-radius: var(--radius-sm); font-size: 13px;
    font-weight: 600; cursor: pointer; flex-shrink: 0;
    font-family: 'Outfit', sans-serif;
  }
  #install-dismiss {
    width: 28px; height: 28px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; color: var(--text3);
    font-size: 18px; flex-shrink: 0; border-radius: 6px;
  }
  #install-dismiss:active { background: var(--bg3); }

  /* ===== PWA STATUS BAR ===== */
  #pwa-status {
    position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
    background: rgba(15,13,10,.95); border: .5px solid var(--border2);
    border-radius: 20px; padding: 6px 14px;
    font-size: 11px; color: var(--text3);
    display: flex; align-items: center; gap: 6px;
    z-index: 250; transition: top .35s ease; white-space: nowrap;
  }
  #pwa-status.show { top: 8px; }
  .pwa-dot { width: 6px; height: 6px; border-radius: 3px; background: #4CAF50;
